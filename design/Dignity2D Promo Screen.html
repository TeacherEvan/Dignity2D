<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --void:    #0A0812;
  --border:  #1A1428;
  --gold:    #FFD700;
  --cyan:    #00FFFF;
  --amber:   #FF8C00;
  --magenta: #FF00CC;
  --sand:    #C8A96E;
  --white:   #FFFFFF;
}

html, body {
  width: 100%; height: 100%;
  background: var(--void);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  font-family: 'Share Tech Mono', monospace;
}

/* ── Artboard: 390×844 (iPhone 14 Pro viewport) ── */
.artboard {
  position: relative;
  width: 390px;
  min-height: 844px;
  background: var(--void);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Scanlines overlay ── */
.artboard::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.18) 2px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* ─────────────────────────────────────
   HERO SECTION
───────────────────────────────────── */
.hero {
  position: relative;
  height: 340px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding-bottom: 36px;
  overflow: hidden;
}

/* gradient fade to void at bottom */
.hero-bg::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(to bottom, transparent, var(--void));
}

.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
}

.title-main {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 84px;
  line-height: 0.9;
  letter-spacing: 0.04em;
  color: var(--white);
  text-transform: uppercase;
  text-shadow:
    0 0 30px rgba(255,215,0,0.35),
    0 0 60px rgba(255,215,0,0.15);
  animation: titlePulse 4s ease-in-out infinite;
}

.title-tag {
  display: inline-block;
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  letter-spacing: 0.2em;
  color: var(--gold);
  background: rgba(255,215,0,0.10);
  border: 1px solid rgba(255,215,0,0.35);
  padding: 3px 10px;
  margin-top: 8px;
  text-transform: uppercase;
}

.tagline {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  color: rgba(200,169,110,0.7);
  text-transform: uppercase;
  margin-top: 14px;
}

@keyframes titlePulse {
  0%, 100% { text-shadow: 0 0 30px rgba(255,215,0,0.35), 0 0 60px rgba(255,215,0,0.15); }
  50%       { text-shadow: 0 0 50px rgba(255,215,0,0.6),  0 0 90px rgba(255,215,0,0.25); }
}

/* Glitch: two pseudo-elements slightly offset on hover/animation */
.title-main {
  position: relative;
}
.title-main::before,
.title-main::after {
  content: 'DIGNITY';
  position: absolute;
  left: 0; top: 0; width: 100%;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 84px;
  line-height: 0.9;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  overflow: hidden;
}
.title-main::before {
  color: var(--cyan);
  opacity: 0;
  animation: glitch1 6s infinite;
  clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
}
.title-main::after {
  color: var(--magenta);
  opacity: 0;
  animation: glitch2 6s infinite;
  clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
}

@keyframes glitch1 {
  0%,89%,100%  { opacity: 0; transform: none; }
  90%          { opacity: 0.7; transform: translateX(-3px); }
  93%          { opacity: 0.7; transform: translateX(3px); }
  96%          { opacity: 0; }
}
@keyframes glitch2 {
  0%,87%,100%  { opacity: 0; transform: none; }
  88%          { opacity: 0.5; transform: translateX(4px); }
  92%          { opacity: 0.5; transform: translateX(-2px); }
  95%          { opacity: 0; }
}

/* ─────────────────────────────────────
   SECTION LABEL
───────────────────────────────────── */
.section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: rgba(200,169,110,0.45);
  text-align: center;
  text-transform: uppercase;
  padding: 20px 0 14px;
  border-top: 1px solid rgba(26,20,40,0.9);
}

/* ─────────────────────────────────────
   ENEMY GRID
───────────────────────────────────── */
.enemy-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 20px 36px;
  flex: 1;
}

.enemy-card {
  background: rgba(26,20,40,0.7);
  border: 1px solid var(--card-color, rgba(255,255,255,0.1));
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}

/* Corner mark */
.enemy-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 0; height: 0;
  border-style: solid;
  border-width: 0 18px 18px 0;
  border-color: transparent var(--card-color, transparent) transparent transparent;
  opacity: 0.6;
}

/* Glow halo behind icon */
.enemy-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 42%, var(--card-color, transparent) 0%, transparent 60%);
  opacity: 0;
  animation: cardGlow 3.5s ease-in-out infinite;
  animation-delay: var(--glow-delay, 0s);
  pointer-events: none;
}

@keyframes cardGlow {
  0%, 100% { opacity: 0; }
  50%       { opacity: 0.07; }
}

/* ── Per-enemy colours ── */
.enemy-card.chaser    { --card-color: var(--amber);   }
.enemy-card.shooter   { --card-color: var(--magenta); }
.enemy-card.orbiter   { --card-color: var(--cyan);    }
.enemy-card.disruptor { --card-color: var(--gold);    }

.enemy-card.chaser    { --glow-delay: 0s;    }
.enemy-card.shooter   { --glow-delay: 0.9s;  }
.enemy-card.orbiter   { --glow-delay: 1.8s;  }
.enemy-card.disruptor { --glow-delay: 2.7s;  }

/* ── Enemy Glyphs (SVG) ── */
.enemy-glyph {
  position: relative;
  z-index: 1;
}

.enemy-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.12em;
  color: var(--card-color, var(--white));
  text-transform: uppercase;
  position: relative;
  z-index: 1;
  animation: namePulse 3.5s ease-in-out infinite;
  animation-delay: var(--glow-delay, 0s);
}

@keyframes namePulse {
  0%, 100% { opacity: 0.85; }
  50%       { opacity: 1; text-shadow: 0 0 12px var(--card-color, transparent); }
}

.enemy-role {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: rgba(200,169,110,0.55);
  text-transform: uppercase;
  text-align: center;
  position: relative;
  z-index: 1;
  line-height: 1.5;
}

/* ─────────────────────────────────────
   FOOTER
───────────────────────────────────── */
.footer {
  text-align: center;
  padding: 10px 0 24px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(200,169,110,0.25);
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="artboard">

  <!-- ── Hero ── -->
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="title-main">DIGNITY</div>
      <div class="title-tag">2D</div>
      <div class="tagline">Claim the dark &middot; Survive it</div>
    </div>
  </div>

  <div class="section-label">// enemies //</div>

  <!-- ── Enemy Grid ── -->
  <div class="enemy-grid">

    <!-- CHASER -->
    <div class="enemy-card chaser">
      <div class="enemy-glyph">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
          <!-- Arrow/wedge pointing right — tracks your trail -->
          <polygon points="8,10 44,26 8,42" fill="none" stroke="#FF8C00" stroke-width="2.5"/>
          <polygon points="14,17 38,26 14,35" fill="#FF8C00" opacity="0.18"/>
          <circle cx="44" cy="26" r="3" fill="#FF8C00" opacity="0.9"/>
          <!-- speed ticks -->
          <line x1="2" y1="16" x2="10" y2="16" stroke="#FF8C00" stroke-width="1.5" opacity="0.5"/>
          <line x1="2" y1="26" x2="10" y2="26" stroke="#FF8C00" stroke-width="1.5" opacity="0.5"/>
          <line x1="2" y1="36" x2="10" y2="36" stroke="#FF8C00" stroke-width="1.5" opacity="0.5"/>
        </svg>
      </div>
      <div class="enemy-name">Chaser</div>
      <div class="enemy-role">Hunts your trail<br>while you draw</div>
    </div>

    <!-- SHOOTER -->
    <div class="enemy-card shooter">
      <div class="enemy-glyph">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
          <!-- Crosshair reticle -->
          <circle cx="26" cy="26" r="14" stroke="#FF00CC" stroke-width="2"/>
          <circle cx="26" cy="26" r="5" fill="#FF00CC" opacity="0.25"/>
          <circle cx="26" cy="26" r="2" fill="#FF00CC"/>
          <!-- cross lines (outside the circle) -->
          <line x1="26" y1="4"  x2="26" y2="12" stroke="#FF00CC" stroke-width="2"/>
          <line x1="26" y1="40" x2="26" y2="48" stroke="#FF00CC" stroke-width="2"/>
          <line x1="4"  y1="26" x2="12" y2="26" stroke="#FF00CC" stroke-width="2"/>
          <line x1="40" y1="26" x2="48" y2="26" stroke="#FF00CC" stroke-width="2"/>
          <!-- tick marks on circle -->
          <line x1="26" y1="12" x2="26" y2="15" stroke="#FF00CC" stroke-width="1.5" opacity="0.6"/>
          <line x1="26" y1="37" x2="26" y2="40" stroke="#FF00CC" stroke-width="1.5" opacity="0.6"/>
        </svg>
      </div>
      <div class="enemy-name">Shooter</div>
      <div class="enemy-role">Fires across lanes<br>you must cross</div>
    </div>

    <!-- ORBITER -->
    <div class="enemy-card orbiter">
      <div class="enemy-glyph">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
          <!-- Core circle -->
          <circle cx="26" cy="26" r="7" fill="#00FFFF" opacity="0.2"/>
          <circle cx="26" cy="26" r="7" stroke="#00FFFF" stroke-width="2"/>
          <!-- Orbit ring (dashed) -->
          <circle cx="26" cy="26" r="18" stroke="#00FFFF" stroke-width="1.5"
                  stroke-dasharray="4 3" opacity="0.6"/>
          <!-- Orbiting dot -->
          <circle cx="44" cy="26" r="3.5" fill="#00FFFF"/>
          <!-- Orbital motion arc hint -->
          <path d="M 38 14 A 18 18 0 0 1 44 26" stroke="#00FFFF" stroke-width="1.5" opacity="0.4"/>
        </svg>
      </div>
      <div class="enemy-name">Orbiter</div>
      <div class="enemy-role">Guards captured<br>territory in loops</div>
    </div>

    <!-- DISRUPTOR -->
    <div class="enemy-card disruptor">
      <div class="enemy-glyph">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
          <!-- Fragmented / shattered X shape -->
          <!-- Main diagonal fragments -->
          <line x1="10" y1="10" x2="22" y2="22" stroke="#FFD700" stroke-width="2.5"/>
          <line x1="30" y1="30" x2="42" y2="42" stroke="#FFD700" stroke-width="2.5"/>
          <line x1="42" y1="10" x2="30" y2="22" stroke="#FFD700" stroke-width="2.5"/>
          <line x1="22" y1="30" x2="10" y2="42" stroke="#FFD700" stroke-width="2.5"/>
          <!-- Gap between fragments — the break -->
          <!-- Jagged crack pieces in the center -->
          <polyline points="22,22 25,24 27,21 30,22" stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.7"/>
          <polyline points="22,30 24,28 27,31 30,30" stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.7"/>
          <!-- Small shard fragments -->
          <line x1="23" y1="17" x2="20" y2="14" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
          <line x1="35" y1="14" x2="38" y2="11" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
          <line x1="14" y1="35" x2="11" y2="38" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
          <line x1="38" y1="35" x2="41" y2="38" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
          <!-- center dot -->
          <circle cx="26" cy="26" r="2.5" fill="#FFD700" opacity="0.5"/>
        </svg>
      </div>
      <div class="enemy-name">Disruptor</div>
      <div class="enemy-role">Breaks co-op bonds<br>when both draw</div>
    </div>

  </div>

  <div class="footer">dignity2d &bull; solo &amp; co-op &bull; capture &amp; survive</div>

</div>
